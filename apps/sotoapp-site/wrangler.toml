name = "sotoapp-site"
main = "src/worker.ts"
compatibility_date = "2026-05-13"

routes = [
  { pattern = "sotoapp.org", custom_domain = true },
  { pattern = "www.sotoapp.org", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true
