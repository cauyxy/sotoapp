<svg xmlns="http://www.w3.org/2000/svg" width="760" height="352" viewBox="0 0 760 352" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EC"/>
      <stop offset="100%" stop-color="#EDE3CC"/>
    </linearGradient>
    <!-- wave bar: white-top → accent-bottom (capsule.css .voice-capsule-wave-bar) -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#5dc8c1"/>
    </linearGradient>
    <!-- thinking band: dim left cap → brighter growing edge -->
    <linearGradient id="bandCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5dc8c1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5dc8c1" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="bandPeri" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8f9bff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8f9bff" stop-opacity="0.44"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-50%" width="180%" height="220%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.34"/>
    </filter>

    <!-- 14-bar equalizer (WAVE_PROFILE × 20px), 2px bars / 2px gap, centered on origin -->
    <g id="wave" fill="url(#waveGrad)">
      <rect x="-27" y="-4.8"  width="2" height="9.6"  rx="1"/>
      <rect x="-23" y="-7.4"  width="2" height="14.8" rx="1"/>
      <rect x="-19" y="-10"   width="2" height="20"   rx="1"/>
      <rect x="-15" y="-6.2"  width="2" height="12.4" rx="1"/>
      <rect x="-11" y="-3.6"  width="2" height="7.2"  rx="1"/>
      <rect x="-7"  y="-8.6"  width="2" height="17.2" rx="1"/>
      <rect x="-3"  y="-5.6"  width="2" height="11.2" rx="1"/>
      <rect x="1"   y="-9.5"  width="2" height="19"   rx="1"/>
      <rect x="5"   y="-6.6"  width="2" height="13.2" rx="1"/>
      <rect x="9"   y="-5"    width="2" height="10"   rx="1"/>
      <rect x="13"  y="-7.8"  width="2" height="15.6" rx="1"/>
      <rect x="17"  y="-4"    width="2" height="8"    rx="1"/>
      <rect x="21"  y="-6.8"  width="2" height="13.6" rx="1"/>
      <rect x="25"  y="-5.2"  width="2" height="10.4" rx="1"/>
    </g>

    <!-- translate mode badge glyph (文/A), modeGlyph() — 14×14 box, top-left origin -->
    <g id="tbadge" fill="#8f9bff">
      <text x="1" y="10" font-size="9">文</text>
      <text x="7.5" y="13" font-size="8">A</text>
    </g>

    <clipPath id="clipTA"><rect x="407" y="132" width="108" height="36" rx="18"/></clipPath>
    <clipPath id="clipSA"><rect x="569" y="132" width="108" height="36" rx="18"/></clipPath>
    <clipPath id="clipTB"><rect x="345" y="274" width="124" height="36" rx="18"/></clipPath>
    <clipPath id="clipSB"><rect x="549" y="274" width="124" height="36" rx="18"/></clipPath>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="759" height="351" rx="22" fill="url(#bg)" stroke="#1A1D22" stroke-opacity="0.06"/>

  <!-- header -->
  <svg x="56" y="26" width="26" height="26" viewBox="0 0 1024 1024">
    <rect x="7" y="7" width="1007" height="1008" rx="203" ry="203" fill="#F8F0E4"/>
    <g fill="none" stroke="#5CBFBE" stroke-linecap="round">
      <path d="M 210 418 A 197 197 0 0 1 403 141" stroke-width="44"/>
      <path d="M 268 403 A 139 139 0 0 1 396 199" stroke-width="39"/>
      <path d="M 312 382 A  90  90 0 0 1 361 253" stroke-width="30"/>
    </g>
    <path fill="#31353D" d="M 510 193 C 429.1 196.7, 345.5 256.4, 340 342 C 327.5 446.6, 430.2 505.1, 510 534 C 546.7 550.2, 592.5 573.6, 606 616 C 622.7 678.2, 556.9 727.3, 500 726 C 429.5 734.2, 384.4 680.8, 328 655 C 295.1 651.8, 267.4 683.9, 275 716 C 309.6 798.7, 404.5 837.2, 489 843 C 601.1 850.6, 706.9 753.7, 721 646 C 731.9 569, 688.6 497.1, 621 464 C 573.4 438.4, 519.4 428.5, 473 400 C 419 370.8, 443.6 291.3, 497 281 C 556.6 257, 610.3 296.4, 656 328 C 740.9 342.4, 706.3 223.9, 645 216 C 604.5 197.4, 559.1 190.8, 510 193 Z"/>
    <g stroke="#5CBFBE" stroke-linecap="round">
      <line x1="741" y1="720" x2="867" y2="720" stroke-width="26"/>
      <line x1="703" y1="777" x2="840" y2="777" stroke-width="26"/>
      <line x1="643" y1="840" x2="862" y2="840" stroke-width="31"/>
      <line x1="900" y1="810" x2="900" y2="864" stroke-width="15"/>
    </g>
  </svg>
  <text x="90" y="43" font-size="13.5" font-weight="600" fill="#1A1D22" letter-spacing="0.2">Soto · the capsule</text>
  <text x="56" y="65" font-size="12" fill="#6B6256">One floating pill, two voice modes — dictation and translate.</text>

  <!-- ════════ ROW A · DICTATION ════════ -->
  <text x="56" y="100" font-size="13" font-weight="600" fill="#1A1D22">Dictation</text>
  <text x="56" y="116" font-size="11" fill="#7A7164">Hold the hotkey, speak, release — polished text lands where the cursor is.</text>

  <!-- A1 idle (60×36) -->
  <g filter="url(#sh)">
    <rect x="107" y="132" width="60" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <circle cx="137" cy="150" r="6" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="137" cy="150" r="3" fill="#ffffff" fill-opacity="0.58"/>
  <text x="137" y="188" text-anchor="middle" font-size="10.5" fill="#7A7164">Idle</text>

  <!-- A2 listening (108×36) -->
  <g filter="url(#sh)">
    <rect x="245" y="132" width="108" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <use href="#wave" transform="translate(299,150)"/>
  <text x="299" y="188" text-anchor="middle" font-size="10.5" fill="#7A7164">Listening</text>

  <!-- A3 thinking (108×36): white dots over a cyan progress band -->
  <g filter="url(#sh)">
    <rect x="407" y="132" width="108" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <rect x="407" y="132" width="67" height="36" fill="url(#bandCyan)" clip-path="url(#clipTA)"/>
  <circle cx="453" cy="150" r="1.5" fill="#ffffff" fill-opacity="0.86"/>
  <circle cx="461" cy="150" r="1.5" fill="#ffffff" fill-opacity="0.86"/>
  <circle cx="469" cy="150" r="1.5" fill="#ffffff" fill-opacity="0.86"/>
  <text x="461" y="188" text-anchor="middle" font-size="10.5" fill="#7A7164">Polishing</text>

  <!-- A4 inserted / success (108×36): accent check over full band -->
  <g filter="url(#sh)">
    <rect x="569" y="132" width="108" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <rect x="569" y="132" width="108" height="36" fill="url(#bandCyan)" clip-path="url(#clipSA)"/>
  <polyline points="617,150 621.5,154 630,144.5" fill="none" stroke="#5dc8c1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="623" y="188" text-anchor="middle" font-size="10.5" fill="#7A7164">Inserted</text>

  <!-- divider -->
  <line x1="56" y1="210" x2="704" y2="210" stroke="#1A1D22" stroke-opacity="0.08"/>

  <!-- ════════ ROW B · TRANSLATE ════════ -->
  <text x="56" y="244" font-size="13" font-weight="600" fill="#1A1D22">Translate</text>
  <text x="56" y="260" font-size="11" fill="#7A7164">Speak in one language; the capsule inserts it in another.</text>

  <!-- B1 listening + intro: 文/A badge (periwinkle) + "Translate" label (178×36, MODE_INTRO_WIDTH) -->
  <g filter="url(#sh)">
    <rect x="87" y="274" width="178" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <use href="#tbadge" transform="translate(107,285)"/>
  <text x="127" y="296" font-size="11" fill="#ffffff" fill-opacity="0.75">Translate</text>
  <use href="#wave" transform="translate(218,292)"/>
  <text x="176" y="330" text-anchor="middle" font-size="10.5" fill="#7A7164">Listening</text>

  <!-- B2 translating (124×36, MODE_COMPACT_WIDTH): 文/A badge + A·文 swap face over periwinkle band -->
  <g filter="url(#sh)">
    <rect x="345" y="274" width="124" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <rect x="345" y="274" width="77" height="36" fill="url(#bandPeri)" clip-path="url(#clipTB)"/>
  <use href="#tbadge" transform="translate(386,285)"/>
  <text x="406" y="296.5" font-size="11" fill="#ffffff" fill-opacity="0.85">A</text>
  <text x="415" y="296.5" font-size="11" fill="#ffffff" fill-opacity="0.85">文</text>
  <text x="407" y="330" text-anchor="middle" font-size="10.5" fill="#7A7164">Translating</text>

  <!-- B3 inserted / success (124×36): 文/A badge + accent check over full periwinkle band -->
  <g filter="url(#sh)">
    <rect x="549" y="274" width="124" height="36" rx="18" fill="rgb(29,26,26)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>
  <rect x="549" y="274" width="124" height="36" fill="url(#bandPeri)" clip-path="url(#clipSB)"/>
  <use href="#tbadge" transform="translate(595,285)"/>
  <polyline points="615,292 619.5,296 628,286.5" fill="none" stroke="#5dc8c1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="611" y="330" text-anchor="middle" font-size="10.5" fill="#7A7164">Inserted</text>
</svg>
